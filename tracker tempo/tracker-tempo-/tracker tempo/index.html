<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tracker Tempo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #111113;
    --panel: #1a1a1e;
    --panel-border: rgba(255,255,255,0.07);
    --text: #f2f1ee;
    --muted: #8f8f96;
    --accent: #ffb84d;
    --accent-soft: rgba(255,184,77,0.14);
    --danger: #ff6b6b;
    --verde: #7dd3a0;
    --arancione: #ffb84d;
    --rosso: #f2707a;
  }
  html[data-theme="chiaro"] {
    --bg: #faf9f7;
    --panel: #ffffff;
    --panel-border: rgba(0,0,0,0.07);
    --text: #16161a;
    --muted: #6b6b72;
    --accent: #d97706;
    --accent-soft: rgba(217,119,6,0.10);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 28px 18px 70px;
    background: var(--bg);
    background-image: radial-gradient(ellipse 600px 400px at 50% -10%, var(--accent-soft), transparent);
    background-repeat: no-repeat;
    color: var(--text);
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    transition: background-color 0.3s, color 0.3s;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 460px; margin: 0 auto; }
  .num { font-family: 'Space Grotesk', sans-serif; }

  .login-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:78vh; text-align:center; }
  .login-mark { font-family: 'Space Grotesk', sans-serif; font-size: 13px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-bottom: 18px; }
  h1 { font-family: 'Space Grotesk', sans-serif; font-size: 26px; font-weight: 700; margin: 0 0 8px; letter-spacing: -0.01em; }
  .sub { color: var(--muted); font-size: 14px; margin-bottom: 28px; max-width: 280px; }
  .btn {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 13px 22px;
    background: var(--text); color: var(--bg);
    border: none; border-radius: 100px;
    font-size: 14px; font-weight: 600;
    cursor: pointer;
    transition: transform 0.15s, opacity 0.15s;
  }
  .btn:hover { opacity: 0.85; transform: translateY(-1px); }
  .denied { color: var(--danger); margin-top: 14px; font-size: 13px; }
  #app { display: none; }

  .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .user-chip { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted); }
  .user-chip img { width: 24px; height: 24px; border-radius: 50%; }
  .icon-btn { background: none; border: none; color: var(--muted); font-size: 13px; cursor: pointer; padding: 6px; opacity: 0.8; }
  .icon-btn:hover { opacity: 1; }

  .hero { text-align: center; padding: 22px 0 8px; }
  .hero-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; font-weight: 600; }
  .hero-value { font-size: 62px; font-weight: 700; line-height: 1; letter-spacing: -0.02em; margin-bottom: 14px; }
  .hero-sub { font-size: 13px; color: var(--muted); }
  .hero-sub b { color: var(--text); font-weight: 600; }
  .hero-sub .dot { margin: 0 10px; opacity: 0.35; }

  .datenav { display: flex; align-items: center; justify-content: center; gap: 14px; margin: 22px 0 24px; }
  .datenav button.freccia {
    background: var(--panel); border: 1px solid var(--panel-border); color: var(--text);
    width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 15px;
  }
  .data-corrente { font-size: 14px; font-weight: 600; min-width: 150px; text-align: center; }
  .oggi-btn { display:block; font-size: 11px; color: var(--accent); background: none; border: none; cursor: pointer; margin: 4px auto 0; }

  .chart-box { background: var(--panel); border: 1px solid var(--panel-border); border-radius: 18px; padding: 20px 14px 16px; margin-bottom: 14px; }
  .chart-titolo { font-size: 12px; color: var(--muted); margin-bottom: 16px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
  .chart { display: flex; align-items: flex-end; gap: 7px; height: 130px; }
  .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; cursor: pointer; height: 100%; justify-content: flex-end; }
  .bar-value { font-size: 10px; color: var(--muted); margin-bottom: 8px; font-variant-numeric: tabular-nums; }
  .bar { width: 100%; max-width: 30px; border-radius: 8px 8px 3px 3px; transition: height 0.7s cubic-bezier(.22,1,.36,1), opacity 0.2s; height: 2px; opacity: 0.55; }
  .bar-col.selezionato .bar { opacity: 1; box-shadow: 0 0 0 2px var(--bg), 0 0 0 3.5px var(--text); }
  .bar-col.selezionato .bar-value, .bar-col.selezionato .bar-label { color: var(--text); font-weight: 700; }
  .bar-label { font-size: 10px; color: var(--muted); margin-top: 9px; }
  .bar.verde { background: var(--verde); }
  .bar.arancione { background: var(--arancione); }
  .bar.rosso { background: var(--rosso); }
  .bar.vuoto { background: var(--panel-border); }

  .dettaglio { background: var(--panel); border: 1px solid var(--panel-border); border-radius: 18px; padding: 4px 18px; margin-bottom: 14px; }
  .dettaglio-riga { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--panel-border); font-size: 13px; }
  .dettaglio-riga:last-child { border-bottom: none; }
  .dettaglio-riga .val { color: var(--text); font-weight: 600; font-variant-numeric: tabular-nums; }
  .dettaglio-riga span:first-child { color: var(--muted); }

  .app-riga { display: flex; justify-content: space-between; align-items: center; padding: 11px 0; font-size: 13px; border-bottom: 1px solid var(--panel-border); }
  .app-riga:last-child { border-bottom: none; }
  .app-riga .val { color: var(--muted); font-variant-numeric: tabular-nums; font-size: 12px; }

  .sezione-titolo { font-size: 11px; color: var(--muted); margin: 22px 4px 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; }
  .vuoto-msg { color: var(--muted); font-size: 13px; text-align: center; padding: 34px 0; }

  @keyframes comparsa { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .hero, .chart-box, .dettaglio { animation: comparsa 0.5s cubic-bezier(.22,1,.36,1); }
</style>
</head>
<body>

<div class="wrap login-screen" id="login-screen">
  <div class="login-mark">Tracker Tempo</div>
  <h1>Quante ore, dove.</h1>
  <div class="sub">Accedi con Google per vedere i tuoi dati d'uso del PC</div>
  <button class="btn" id="login-btn">Accedi con Google</button>
  <div class="denied" id="denied-msg" style="display:none;"></div>
</div>

<div class="wrap" id="app">
  <div class="topbar">
    <div class="user-chip">
      <img id="user-photo" src="" alt="">
      <span id="user-email"></span>
    </div>
    <div>
      <button class="icon-btn" id="tema-btn">🌙</button>
      <button class="icon-btn" id="logout-btn">Esci</button>
    </div>
  </div>

  <div class="hero">
    <div class="hero-label">Ore di oggi</div>
    <div class="hero-value num" id="val-oggi">—</div>
    <div class="hero-sub"><b id="val-settimana">—</b> questa settimana<span class="dot">·</span><b id="val-mese">—</b> questo mese</div>
  </div>

  <div class="datenav">
    <button class="freccia" id="giorno-prec">‹</button>
    <div>
      <div class="data-corrente" id="data-corrente">—</div>
      <button class="oggi-btn" id="vai-oggi">Torna a oggi</button>
    </div>
    <button class="freccia" id="giorno-succ">›</button>
  </div>

  <div class="chart-box">
    <div class="chart-titolo" id="chart-titolo">Questa settimana</div>
    <div class="chart" id="chart"></div>
  </div>

  <div class="sezione-titolo" id="dettaglio-titolo">Dettaglio giornata</div>
  <div class="dettaglio" id="dettaglio"></div>

  <div class="sezione-titolo">Programmi più usati</div>
  <div class="dettaglio" id="top-app"></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBSCtZDKkbzQeUOCL9R2z-29U_ay9Ejev4",
    authDomain: "tracker-tempo.firebaseapp.com",
    projectId: "tracker-tempo",
    storageBucket: "tracker-tempo.firebasestorage.app",
    messagingSenderId: "398735707427",
    appId: "1:398735707427:web:0f9f8b77ab2a3c3aca9096"
  };

  const EMAIL_AUTORIZZATA = "vdegiorgio695@gmail.com";

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();

  const loginScreen = document.getElementById("login-screen");
  const appScreen = document.getElementById("app");
  const deniedMsg = document.getElementById("denied-msg");

  document.getElementById("login-btn").addEventListener("click", () => {
    deniedMsg.style.display = "none";
    signInWithPopup(auth, provider).catch((err) => {
      deniedMsg.textContent = "Errore di accesso: " + err.message;
      deniedMsg.style.display = "block";
    });
  });
  document.getElementById("logout-btn").addEventListener("click", () => signOut(auth));

  onAuthStateChanged(auth, (user) => {
    if (!user) {
      loginScreen.style.display = "flex";
      appScreen.style.display = "none";
      return;
    }
    if (user.email !== EMAIL_AUTORIZZATA) {
      deniedMsg.textContent = `Account "${user.email}" non autorizzato per questo sito.`;
      deniedMsg.style.display = "block";
      loginScreen.style.display = "flex";
      appScreen.style.display = "none";
      signOut(auth);
      return;
    }
    loginScreen.style.display = "none";
    appScreen.style.display = "block";
    document.getElementById("user-photo").src = user.photoURL || "";
    document.getElementById("user-email").textContent = user.email;
    avviaApp();
  });

  let tutteLeSessioni = [];
  let dataSelezionata = new Date();
  let temaScuro = true;

  const NOMI_GIORNI = ["Dom","Lun","Mar","Mer","Gio","Ven","Sab"];
  const NOMI_GIORNI_ESTESI = ["Domenica","Lunedì","Martedì","Mercoledì","Giovedì","Venerdì","Sabato"];
  const NOMI_MESI = ["Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno","Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"];

  function stessoGiorno(a, b) {
    return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
  }
  function inizioSettimana(d) {
    const x = new Date(d);
    const giorno = x.getDay();
    const diff = x.getDate() - giorno + (giorno === 0 ? -6 : 1);
    x.setDate(diff);
    x.setHours(0,0,0,0);
    return x;
  }
  function formattaDataBreve(d) {
    const oggi = new Date();
    if (stessoGiorno(d, oggi)) return "Oggi";
    const ieri = new Date(oggi); ieri.setDate(ieri.getDate()-1);
    if (stessoGiorno(d, ieri)) return "Ieri";
    return `${NOMI_GIORNI_ESTESI[d.getDay()]} ${d.getDate()} ${NOMI_MESI[d.getMonth()]}`;
  }
  function formattaOre(secondi) {
    if (!secondi) return "0min";
    const ore = secondi / 3600;
    if (ore < 1) return `${Math.round(secondi/60)}min`;
    const h = Math.floor(ore);
    const m = Math.round((ore - h) * 60);
    return m > 0 ? `${h}h ${m}min` : `${h}h`;
  }
  function formattaOra(d) {
    return d.toLocaleTimeString("it-IT", { hour: "2-digit", minute: "2-digit" });
  }

  function sessioniDelGiorno(data) {
    return tutteLeSessioni.filter(s => stessoGiorno(s.inizio, data));
  }
  function sessioniPeriodo(inizio, fine) {
    return tutteLeSessioni.filter(s => s.inizio >= inizio && s.inizio < fine);
  }
  function secondiTotali(sessioni) {
    return sessioni.reduce((tot, s) => tot + s.durata_secondi, 0);
  }
  function classeColore(secondi) {
    const ore = secondi / 3600;
    if (ore >= 8) return "rosso";
    if (ore >= 5) return "arancione";
    if (ore > 0) return "verde";
    return "vuoto";
  }

  async function caricaSessioni() {
    const snapshot = await getDocs(collection(db, "sessioni"));
    tutteLeSessioni = [];
    snapshot.forEach((doc) => {
      const d = doc.data();
      tutteLeSessioni.push({
        programma: d.programma,
        inizio: d.inizio.toDate(),
        fine: d.fine.toDate(),
        durata_secondi: d.durata_secondi,
      });
    });
  }

  function renderCards() {
    const oggi = new Date();
    const inizioSett = inizioSettimana(oggi);
    const fineSett = new Date(inizioSett); fineSett.setDate(fineSett.getDate()+7);
    const inizioMeseCorr = new Date(oggi.getFullYear(), oggi.getMonth(), 1);
    const fineMeseCorr = new Date(oggi.getFullYear(), oggi.getMonth()+1, 1);

    document.getElementById("val-oggi").textContent = formattaOre(secondiTotali(sessioniDelGiorno(oggi)));
    document.getElementById("val-settimana").textContent = formattaOre(secondiTotali(sessioniPeriodo(inizioSett, fineSett)));
    document.getElementById("val-mese").textContent = formattaOre(secondiTotali(sessioniPeriodo(inizioMeseCorr, fineMeseCorr)));
  }

  function renderChart() {
    const inizioSett = inizioSettimana(dataSelezionata);
    const chart = document.getElementById("chart");
    chart.innerHTML = "";

    const totaliGiorni = [];
    for (let i = 0; i < 7; i++) {
      const giorno = new Date(inizioSett); giorno.setDate(giorno.getDate()+i);
      totaliGiorni.push({ giorno, secondi: secondiTotali(sessioniDelGiorno(giorno)) });
    }
    const massimo = Math.max(...totaliGiorni.map(g => g.secondi), 3600);

    totaliGiorni.forEach(({ giorno, secondi }) => {
      const col = document.createElement("div");
      col.className = "bar-col" + (stessoGiorno(giorno, dataSelezionata) ? " selezionato" : "");
      const altezzaPerc = Math.max((secondi / massimo) * 100, secondi > 0 ? 4 : 1);
      col.innerHTML = `
        <div class="bar-value">${secondi > 0 ? formattaOre(secondi) : ""}</div>
        <div class="bar ${classeColore(secondi)}" style="height:${altezzaPerc}%"></div>
        <div class="bar-label">${NOMI_GIORNI[giorno.getDay()]} ${giorno.getDate()}</div>
      `;
      col.addEventListener("click", () => selezionaGiorno(giorno));
      chart.appendChild(col);
    });

    const titolo = document.getElementById("chart-titolo");
    const oggi = new Date();
    titolo.textContent = stessoGiorno(inizioSett, inizioSettimana(oggi)) ? "Questa settimana" : `Settimana del ${inizioSett.getDate()} ${NOMI_MESI[inizioSett.getMonth()]}`;
  }

  function renderDettaglio() {
    document.getElementById("data-corrente").textContent = formattaDataBreve(dataSelezionata);
    document.getElementById("dettaglio-titolo").textContent = `Dettaglio — ${formattaDataBreve(dataSelezionata)}`;

    const sessioni = sessioniDelGiorno(dataSelezionata);
    const dettaglio = document.getElementById("dettaglio");
    const topApp = document.getElementById("top-app");

    if (sessioni.length === 0) {
      dettaglio.innerHTML = `<div class="vuoto-msg">Nessuna attività registrata questo giorno</div>`;
      topApp.innerHTML = "";
      return;
    }

    const totale = secondiTotali(sessioni);
    const inizi = sessioni.map(s => s.inizio.getTime());
    const fini = sessioni.map(s => s.fine.getTime());
    const primoAvvio = new Date(Math.min(...inizi));
    const ultimoUtilizzo = new Date(Math.max(...fini));
    const durataMedia = totale / sessioni.length;

    dettaglio.innerHTML = `
      <div class="dettaglio-riga"><span>Ore totali</span><span class="val">${formattaOre(totale)}</span></div>
      <div class="dettaglio-riga"><span>Primo avvio</span><span class="val">${formattaOra(primoAvvio)}</span></div>
      <div class="dettaglio-riga"><span>Ultimo utilizzo</span><span class="val">${formattaOra(ultimoUtilizzo)}</span></div>
      <div class="dettaglio-riga"><span>Sessioni</span><span class="val">${sessioni.length}</span></div>
      <div class="dettaglio-riga"><span>Durata media</span><span class="val">${formattaOre(durataMedia)}</span></div>
    `;

    const perProgramma = {};
    sessioni.forEach(s => { perProgramma[s.programma] = (perProgramma[s.programma]||0) + s.durata_secondi; });
    const top5 = Object.entries(perProgramma).sort((a,b)=>b[1]-a[1]).slice(0,5);

    topApp.innerHTML = top5.map(([nome, sec]) =>
      `<div class="app-riga"><span>${nome}</span><span class="val">${formattaOre(sec)}</span></div>`
    ).join("");
  }

  function aggiornaTutto() {
    renderCards();
    renderChart();
    renderDettaglio();
  }

  function selezionaGiorno(d) {
    dataSelezionata = d;
    aggiornaTutto();
  }

  document.getElementById("giorno-prec").addEventListener("click", () => {
    const d = new Date(dataSelezionata); d.setDate(d.getDate()-1);
    selezionaGiorno(d);
  });
  document.getElementById("giorno-succ").addEventListener("click", () => {
    const d = new Date(dataSelezionata); d.setDate(d.getDate()+1);
    selezionaGiorno(d);
  });
  document.getElementById("vai-oggi").addEventListener("click", () => selezionaGiorno(new Date()));

  document.getElementById("tema-btn").addEventListener("click", () => {
    temaScuro = !temaScuro;
    document.documentElement.setAttribute("data-theme", temaScuro ? "scuro" : "chiaro");
    document.getElementById("tema-btn").textContent = temaScuro ? "🌙" : "☀️";
  });

  async function avviaApp() {
    document.getElementById("data-corrente").textContent = "Caricamento...";
    await caricaSessioni();
    aggiornaTutto();
  }
</script>
</body>
</html>
