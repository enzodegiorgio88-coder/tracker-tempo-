<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tracker Tempo</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --text: #e6e8eb;
    --muted: #8b93a1;
    --accent: #5eb3ff;
    --danger: #ff6b6b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 40px 20px;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
  }
  .wrap { max-width: 640px; margin: 0 auto; }
  h1 { font-size: 22px; font-weight: 600; margin: 0 0 4px; }
  .sub { color: var(--muted); font-size: 14px; margin-bottom: 28px; }
  .status { color: var(--muted); font-size: 14px; margin-bottom: 16px; }
  .row {
    display: flex;
    justify-content: space-between;
    padding: 12px 16px;
    background: var(--panel);
    border-radius: 8px;
    margin-bottom: 8px;
    font-size: 14px;
  }
  .row .dur { color: var(--accent); font-variant-numeric: tabular-nums; }

  .login-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    text-align: center;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 12px 20px;
    background: var(--panel);
    color: var(--text);
    border: 1px solid #2a2f3a;
    border-radius: 8px;
    font-size: 15px;
    cursor: pointer;
    margin-top: 16px;
  }
  .btn:hover { border-color: var(--accent); }
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
  }
  .user-chip {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--muted);
  }
  .user-chip img { width: 24px; height: 24px; border-radius: 50%; }
  .link-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 13px;
    text-decoration: underline;
    cursor: pointer;
  }
  .denied { color: var(--danger); margin-top: 12px; font-size: 13px; }
  #app { display: none; }
</style>
</head>
<body>

<div class="wrap login-screen" id="login-screen">
  <h1>Tracker Tempo</h1>
  <div class="sub">Accedi con il tuo account Google per vedere i tuoi dati</div>
  <button class="btn" id="login-btn">Accedi con Google</button>
  <div class="denied" id="denied-msg" style="display:none;"></div>
</div>

<div class="wrap" id="app">
  <div class="topbar">
    <h1 style="margin:0; font-size:18px;">Tracker Tempo</h1>
    <div class="user-chip">
      <img id="user-photo" src="" alt="">
      <span id="user-email"></span>
      <button class="link-btn" id="logout-btn">Esci</button>
    </div>
  </div>
  <div class="status" id="status">Caricamento...</div>
  <div id="lista"></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBSCtZDKkbzQeUOCL9R2z-29U_ay9Ejev4",
    authDomain: "tracker-tempo.firebaseapp.com",
    projectId: "tracker-tempo",
    storageBucket: "tracker-tempo.firebasestorage.app",
    messagingSenderId: "398735707427",
    appId: "1:398735707427:web:0f9f8b77ab2a3c3aca9096"
  };

  const EMAIL_AUTORIZZATA = "vdegiorgio695@gmail.com";

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();

  const loginScreen = document.getElementById("login-screen");
  const appScreen = document.getElementById("app");
  const deniedMsg = document.getElementById("denied-msg");

  document.getElementById("login-btn").addEventListener("click", () => {
    deniedMsg.style.display = "none";
    signInWithPopup(auth, provider).catch((err) => {
      deniedMsg.textContent = "Errore di accesso: " + err.message;
      deniedMsg.style.display = "block";
    });
  });

  document.getElementById("logout-btn").addEventListener("click", () => {
    signOut(auth);
  });

  onAuthStateChanged(auth, (user) => {
    if (!user) {
      loginScreen.style.display = "flex";
      appScreen.style.display = "none";
      return;
    }

    if (user.email !== EMAIL_AUTORIZZATA) {
      deniedMsg.textContent = `Account "${user.email}" non autorizzato per questo sito.`;
      deniedMsg.style.display = "block";
      loginScreen.style.display = "flex";
      appScreen.style.display = "none";
      signOut(auth);
      return;
    }

    loginScreen.style.display = "none";
    appScreen.style.display = "block";
    document.getElementById("user-photo").src = user.photoURL || "";
    document.getElementById("user-email").textContent = user.email;
    caricaDati();
  });

  function formattaDurata(sec) {
    const m = Math.floor(sec / 60);
    const s = sec % 60;
    return m > 0 ? `${m}m ${s}s` : `${s}s`;
  }

  async function caricaDati() {
    const status = document.getElementById("status");
    const lista = document.getElementById("lista");
    lista.innerHTML = "";

    try {
      const snapshot = await getDocs(collection(db, "sessioni"));

      if (snapshot.empty) {
        status.textContent = "Connesso, ma nessun dato trovato — hai fatto girare il tracker?";
        return;
      }

      status.textContent = `Connesso — ${snapshot.size} sessioni trovate`;

      snapshot.forEach((doc) => {
        const d = doc.data();
        const row = document.createElement("div");
        row.className = "row";
        row.innerHTML = `<span class="prog">${d.programma}</span><span class="dur">${formattaDurata(d.durata_secondi)}</span>`;
        lista.appendChild(row);
      });
    } catch (err) {
      status.textContent = "Errore di connessione: " + err.message;
    }
  }
</script>
</body>
</html>
